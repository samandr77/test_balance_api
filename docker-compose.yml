services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: withdrawals
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d withdrawals"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app:secret@postgres:5432/withdrawals?sslmode=disable
      API_TOKEN: dev-token
      PORT: 8080
      APP_ENV: development
    ports:
      - "8080:8080"
