services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://user:password@postgres:5432/db?sslmode=disable"
      API_TOKEN: dev-token  
      PORT:8080
      APP_ENV: development
    ports:
      - "8080:8080"